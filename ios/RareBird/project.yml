name: RareBird
options:
  bundleIdPrefix: com.rarebird
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
targets:
  RareBird:
    type: application
    platform: iOS
    sources:
      - Sources/RareBirdApp
    resources:
      - path: Sources/RareBirdApp/Resources/RarityTextClassifier.json
