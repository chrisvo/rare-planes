      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rarebird.app
        INFOPLIST_FILE: Info.plist
        SUPPORTS_MACCATALYST: YES
        ENABLE_DEBUG_DYLIB: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 84TUCN4A47
